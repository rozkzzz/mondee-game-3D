<style>
  body { margin: 0; }
</style>

<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three'
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'

  const scene = new THREE.Scene()
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000)
  camera.position.set(0, 2, 8)  

  const renderer = new THREE.WebGLRenderer({ antialias: true })
  renderer.shadowMap.enabled = true
  renderer.setSize(window.innerWidth, window.innerHeight)
  document.body.appendChild(renderer.domElement)

  const controls = new OrbitControls(camera, renderer.domElement)

 
  const dirLight = new THREE.DirectionalLight(0xffffff, 1)
  dirLight.position.set(0, 5, 3)
  dirLight.castShadow = true
  scene.add(dirLight)
  scene.add(new THREE.AmbientLight(0xffffff, 0.5))

  class Box extends THREE.Mesh {
    constructor({ width, height, depth, color = 0x00ff00, velocity = { x: 0, y: 0, z: 0 }, position = { x: 0, y: 0, z: 0 } }) {
      super(
        new THREE.BoxGeometry(width, height, depth),
        new THREE.MeshStandardMaterial({ color })
      )
      this.width = width
      this.height = height
      this.depth = depth
      this.velocity = velocity
      this.gravity = -0.005
      
      this.position.set(position.x, position.y, position.z)

      this.bottom = this.position.y - this.height / 2
      this.top    = this.position.y + this.height / 2
    }

    update(ground) {
      this.bottom = this.position.y - this.height / 2
      this.top    = this.position.y + this.height / 2

      this.position.x += this.velocity.x
      this.applyGravity()
    }
    applyGravity(){
      this.velocity.y += this.gravity
      

      if (this.bottom + this.velocity.y <= ground.top) {
        this.velocity.y *= 0.8
        this.velocity.y = -this.velocity.y
      }
      else this.position.y += this.velocity.y
    }
  }

  
  const ground = new Box({
    width: 10,
    height: 0.5,
    depth: 10,
    color: 0x00aaff,
    position: { x: 0, y: -2, z: 0 }
  })
  ground.receiveShadow = true
  scene.add(ground)  


  const player = new Box({
    width: 1,
    height: 1,
    depth: 1,
    color: 0xff0000,
    velocity: { x: 0, y: -0.05, z: 0 },
    position: { x: 0, y: 2, z: 0 }
  })
  player.visible = false
  scene.add(player)

  
  let foxModel
  const loader = new GLTFLoader()
  loader.load(
  `model/fox/scene.gltf`,
  function (gltf) {
    foxModel = gltf.scene
    
  
    const box = new THREE.Box3().setFromObject(foxModel)
    const size = box.getSize(new THREE.Vector3())
    console.log('Fox size:', size)
    console.log('Fox position:', foxModel.position)

    foxModel.traverse(child => {
      if (child.isMesh) child.castShadow = true
    })
    scene.add(foxModel)
    console.log('Fox added to scene')
  },
  function (progress) {
    console.log('Loading:', (progress.loaded / progress.total * 100) + '%')
  },
  function (error) {
    console.error('โหลด model ไม่ได้', error)  
  }
)
  window.addEventListener('keydown',(event)=>{
    
    switch (event.code){
      case 'KeyA':
        player.velocity.x = -0.05
        break
      case 'KeyD':
        player.velocity.x = +0.05
        break
      case 'ArrowLeft':
        player.velocity.x = -0.05
        break
      case 'ArrowRight':
        player.velocity.x = +0.05
        break
      case 'ArrowUp':
        player.velocity.y = +0.1
        break
      case 'KeyW':
        player.velocity.y = +0.1
        break
    }
  })
  function animate() {
    requestAnimationFrame(animate)
    controls.update()

    player.update(ground)

    if (foxModel) {
      foxModel.position.copy(player.position)
      foxModel.position.y -= 0.5
    }

    renderer.render(scene, camera)
  }

  animate()
</script>
