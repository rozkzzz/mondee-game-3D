<!DOCTYPE html>
<html>
<head>
  <title>Fox Game</title>
  <style>
    body { margin: 0; }

    #score {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 28px;
      font-family: monospace;
      text-shadow: 2px 2px 4px black;
      z-index: 10;
    }

    #audio-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    img{
      max-width: 50%;
    }
    #btn-mute {
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      font-size: 20px;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    #volume {
      width: 80px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>

  <div id="audio-controls">
    <button id="btn-mute">&#128266;</button>
    <input id="volume" type="range" min="0" max="1" step="0.1" value="0.5">
    <a href="https://vt.tiktok.com/ZS9FbNKyKu4aK-OiQcQ/">
  <img src="images/logo.png" />
    </a>
    
  </div>
  
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'

    // ---------- SETUP ----------
    const scene = new THREE.Scene()
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(0, 2, 8)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.shadowMap.enabled = true
    renderer.outputColorSpace = THREE.SRGBColorSpace
    renderer.setSize(window.innerWidth, window.innerHeight)
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)

    // ---------- AUDIO ----------
    const audio = new Audio('music/mondee-music.m4a')
    audio.loop   = true
    audio.volume = 0.5
    audio.play()

    const btnMute = document.getElementById('btn-mute')
    const volumeSlider = document.getElementById('volume')

    btnMute.addEventListener('click', () => {
      audio.muted = !audio.muted
      btnMute.textContent = audio.muted ? '🔇' : '🔊'
    })

    volumeSlider.addEventListener('input', () => {
      audio.volume = volumeSlider.value
      if (volumeSlider.value == 0) {
        btnMute.textContent = '🔇'
      } else {
        btnMute.textContent = '🔊'
        audio.muted = false
      }
    })

    // ---------- LIGHT ----------
    const dirLight = new THREE.DirectionalLight(0xffffff, 1)
    dirLight.position.set(0, 5, 3)
    dirLight.castShadow = true
    scene.add(dirLight)
    scene.add(new THREE.AmbientLight(0xffffff, 0.4))

    // ---------- TEXTURE ----------
    const textureLoader = new THREE.TextureLoader()

    const colorMap = textureLoader.load('textures/Rocks004_1K-JPG_Color.jpg')
    colorMap.colorSpace = THREE.SRGBColorSpace
    const normalMap = textureLoader.load('textures/Rocks004_1K-JPG_NormalGL.jpg')
    const roughMap  = textureLoader.load('textures/Rocks004_1K-JPG_Roughness.jpg')
    const aoMap     = textureLoader.load('textures/Rocks004_1K-JPG_AmbientOcclusion.jpg')

    colorMap.wrapS = colorMap.wrapT = THREE.RepeatWrapping
    normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping
    roughMap.wrapS  = roughMap.wrapT  = THREE.RepeatWrapping
    aoMap.wrapS     = aoMap.wrapT     = THREE.RepeatWrapping

    colorMap.repeat.set(4, 4)
    normalMap.repeat.set(4, 4)
    roughMap.repeat.set(4, 4)
    aoMap.repeat.set(4, 4)
    const bgTexture = textureLoader.load('images/temple.jpg')
    scene.background = bgTexture
    // ---------- BOX CLASS ----------
    class Box extends THREE.Mesh {
      constructor({ width, height, depth, color = 0xffffff, velocity = { x: 0, y: 0, z: 0 }, position = { x: 0, y: 0, z: 0 }, gravity = -0.002 }) {
        super(
          new THREE.BoxGeometry(width, height, depth),
          new THREE.MeshStandardMaterial({ color })
        )
        this.width    = width
        this.height   = height
        this.depth    = depth
        this.velocity = velocity
        this.gravity  = gravity

        this.position.set(position.x, position.y, position.z)

        this.bottom = this.position.y - this.height / 2
        this.top    = this.position.y + this.height / 2
        this.left   = this.position.x - this.width / 2
        this.right  = this.position.x + this.width / 2
      }

      updateSides() {
        this.bottom = this.position.y - this.height / 2
        this.top    = this.position.y + this.height / 2
        this.left   = this.position.x - this.width / 2
        this.right  = this.position.x + this.width / 2
      }

      update(ground) {
        this.updateSides()
        this.position.x += this.velocity.x
        this.applyGravity(ground)
      }

      applyGravity(ground) {
        this.velocity.y += this.gravity

        const xCollision = this.right >= ground.left && this.left <= ground.right

        if (xCollision && this.bottom + this.velocity.y <= ground.top) {
          this.velocity.y = 0
          this.position.y = ground.top + this.height / 2
        } else {
          this.position.y += this.velocity.y
        }
      }
    }

    // ---------- COLLISION ----------
    function boxCollision(box1, box2) {
      const xCollision = box1.right >= box2.left && box1.left <= box2.right
      const yCollision = box1.bottom <= box2.top  && box1.top >= box2.bottom
      return xCollision && yCollision
    }

    // ---------- GROUND ----------
    const ground = new Box({
      width: 10, height: 0.5, depth: 10,
      color: 0xffffff,
      position: { x: 0, y: -2, z: 0 }
    })
    ground.material.map          = colorMap
    ground.material.normalMap    = normalMap
    ground.material.roughnessMap = roughMap
    ground.material.aoMap        = aoMap
    ground.material.needsUpdate  = true
    ground.receiveShadow = true
    scene.add(ground)

    // ---------- PLAYER ----------
    const player = new Box({
      width: 1, height: 1, depth: 1,
      color: 0xff0000,
      velocity: { x: 0, y: 0, z: 0 },
      position: { x: 0, y: 2, z: 0 }
    })
    player.visible = false
    scene.add(player)

    // ---------- LOAD MODELS ----------
    const loader = new GLTFLoader()
    let foxModel = null

    function scaleToHeight(model, targetHeight) {
      const box3 = new THREE.Box3().setFromObject(model)
      const size = box3.getSize(new THREE.Vector3())
      const scale = targetHeight / size.y
      model.scale.set(scale, scale, scale)
    }

    loader.load('model/fox/scene.gltf', (gltf) => {
      foxModel = gltf.scene
      scaleToHeight(foxModel, 1)
      foxModel.traverse(child => { if (child.isMesh) child.castShadow = true })
      scene.add(foxModel)
    }, null, (err) => console.error('fox:', err))

    // ---------- ENTITIES ----------
    const entities = []

    // rotationSpeed = radian per frame
    function spawnEntity(modelPath, score, targetHeight, gravity, rotationSpeed) {
      const randomX = Math.random() * 8 - 4

      const box = new Box({
        width: targetHeight, height: targetHeight, depth: targetHeight,
        position: { x: randomX, y: 15, z: 0 },
        velocity: { x: 0, y: 0, z: 0 },
        gravity: gravity
      })
      box.visible = false
      scene.add(box)

      loader.load(modelPath, (gltf) => {
        const model = gltf.scene
        scaleToHeight(model, targetHeight)
        model.traverse(child => { if (child.isMesh) child.castShadow = true })
        scene.add(model)

        entities.push({ box, model, score, rotationSpeed })
      }, null, (err) => console.error(modelPath, err))
    }

    // spawn first — (path, score, size, gravity, rotationSpeed)
    spawnEntity('model/skull/scene.gltf',         -70,  0.8, -0.001, 0.02)
    spawnEntity('model/demon/scene.gltf',         -120,  1.2, -0.002, 0.03)
    spawnEntity('model/bottle_normal/scene.gltf',  50,   0.6, -0.001, 0.015)
    spawnEntity('model/bottle_gold/scene.gltf',   100,   0.6, -0.001, 0.025)

    let spawnTimer = 0
    const SPAWN_INTERVAL = 180

    // ---------- KEYS ----------
    const keys = {
      a:     { pressed: false },
      d:     { pressed: false },
      w:     { pressed: false },
      left:  { pressed: false },
      right: { pressed: false },
      up:    { pressed: false },
      space: { pressed: false }
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyA')       keys.a.pressed     = true
      if (e.code === 'KeyD')       keys.d.pressed     = true
      if (e.code === 'KeyW')       keys.w.pressed     = true
      if (e.code === 'ArrowLeft')  keys.left.pressed  = true
      if (e.code === 'ArrowRight') keys.right.pressed = true
      if (e.code === 'ArrowUp')    keys.up.pressed    = true
      if (e.code === 'Space')      keys.space.pressed = true
    })

    window.addEventListener('keyup', (e) => {
      if (e.code === 'KeyA')       keys.a.pressed     = false
      if (e.code === 'KeyD')       keys.d.pressed     = false
      if (e.code === 'KeyW')       keys.w.pressed     = false
      if (e.code === 'ArrowLeft')  keys.left.pressed  = false
      if (e.code === 'ArrowRight') keys.right.pressed = false
      if (e.code === 'ArrowUp')    keys.up.pressed    = false
      if (e.code === 'Space')      keys.space.pressed = false
    })

    // ---------- SCORE ----------
    let totalScore = 0
    const scoreEl = document.getElementById('score')

    // ---------- ANIMATE ----------
    function animate() {
      requestAnimationFrame(animate)
      controls.update()

      player.velocity.x = 0
      if (keys.a.pressed || keys.left.pressed)  player.velocity.x = -0.05
      if (keys.d.pressed || keys.right.pressed) player.velocity.x = 0.05
      if (keys.w.pressed || keys.up.pressed || keys.space.pressed) {
        if (player.velocity.y <= 0.01) player.velocity.y = 0.12
      }

      player.update(ground)

      if (foxModel) {
        foxModel.position.copy(player.position)
        foxModel.position.y -= 0.5
      }

      spawnTimer++
      if (spawnTimer >= SPAWN_INTERVAL) {
        spawnTimer = 0
        spawnEntity('model/skull/scene.gltf',         -70,  0.8, -0.001, 0.02)
        spawnEntity('model/demon/scene.gltf',         -120,  1.2, -0.002, 0.03)
        spawnEntity('model/bottle_normal/scene.gltf',  50,   0.6, -0.001, 0.015)
        spawnEntity('model/bottle_gold/scene.gltf',   100,   0.6, -0.001, 0.025)
      }

      for (let i = entities.length - 1; i >= 0; i--) {
        const entity = entities[i]

        entity.box.update(ground)

        if (entity.model) {
          entity.model.position.copy(entity.box.position)
          // rotate while falling
          if (entity.box.velocity.y !== 0) {
            entity.model.rotation.y += entity.rotationSpeed
            entity.model.rotation.x += entity.rotationSpeed * 0.5
          }
        }

        if (boxCollision(player, entity.box)) {
          totalScore += entity.score
          scoreEl.textContent = 'Score: ' + totalScore
          scene.remove(entity.box)
          scene.remove(entity.model)
          entities.splice(i, 1)
        } else if (entity.box.velocity.y === 0 && entity.box.bottom <= ground.top + 0.01) {
          scene.remove(entity.box)
          scene.remove(entity.model)
          entities.splice(i, 1)
        }
      }

      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
